# BizRush backend and admin services
# Frontend Flutter apps are run locally.

include:
  - ./mocks/docker-compose.yml

services:
  # Admin dashboard (containerized)
  admin:
    platform: linux/amd64
    profiles: [admin]
    build:
      context: ./admin-base
      target: dev
    volumes:
      - ./admin-base:/workspace
      - admin-node-modules:/workspace/node_modules
      - npm-cache:/root/.npm
    working_dir: /workspace
    ports:
      - "${ADMIN_PORT:-3001}:${ADMIN_PORT:-3001}"
    command: npm run dev -- --hostname 0.0.0.0 --port ${ADMIN_PORT:-3001}
    tty: true

volumes:
  # Persists Node dependencies for admin dashboard between runs
  admin-node-modules:
  # Persists npm download cache between runs
  npm-cache:
