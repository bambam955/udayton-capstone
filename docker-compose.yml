# BizRush backend and admin services
# Frontend Flutter apps are run locally.

include:
  - ./mocks/docker-compose.yml

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: bizrush
      POSTGRES_USER: bizrush
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_local}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bizrush -d bizrush"]
      interval: 5s
      timeout: 5s
      retries: 10
  # Admin dashboard (containerized)
  flyway:
    image: flyway/flyway:12.1.0
    depends_on:
      db:
        condition: service_healthy
    command: >
      -url=jdbc:postgresql://db:5432/bizrush
      -user=bizrush
      -password=${POSTGRES_PASSWORD:-change_me_local}
      -connectRetries=60
      migrate
    volumes:
      - ./db/migrations:/flyway/sql
  admin:
    platform: linux/amd64
    profiles: [admin]
    build:
      context: ./admin-base
      target: dev
    volumes:
      - ./admin-base:/workspace
      - admin-node-modules:/workspace/node_modules
      - npm-cache:/root/.npm
    working_dir: /workspace
    ports:
      - "${ADMIN_PORT:-3001}:${ADMIN_PORT:-3001}"
    command: npm run dev -- --port ${ADMIN_PORT:-3001}
    tty: true


volumes:
  admin-node-modules:
  npm-cache:
  pgdata: