# BizRush backend and admin services
# Frontend Flutter apps are run locally.

include:
  - ./mocks/docker-compose.yml

services:
  # ---------- Backend (always start) ---------- #

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: bizrush
      POSTGRES_USER: bizrush
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bizrush -d bizrush"]
      interval: 5s
      timeout: 5s
      retries: 10

  # api:
  #   build: ./api
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - db

  # Admin dashboard (containerized)
  admin:
    platform: linux/amd64
    profiles: [admin]
    build:
      context: ./admin-base
      target: dev
    volumes:
      - ./admin-base:/workspace
      - admin-node-modules:/workspace/node_modules
      - npm-cache:/root/.npm
    working_dir: /workspace
    ports:
      - "${ADMIN_PORT:-3001}:${ADMIN_PORT:-3001}"
    command: npm run dev -- --port ${ADMIN_PORT:-3001}
    tty: true

volumes:
  # Persists Node dependencies for admin dashboard between runs
  admin-node-modules:
  # Persists npm download cache between runs
  npm-cache:
  pgdata:
