# BizRush backend, mocks, and admin services
# Frontend Flutter apps are run locally.

include:
  - ./db/docker-compose.yml
  - ./mocks/docker-compose.yml

services:
  # ---------- Backend (always start) ---------- #

  api:
    build:
      context: ./api
      target: dev
    volumes:
      - ./api:/workspace
      - api-node-modules:/workspace/node_modules
    environment:
      PORT: ${API_PORT:-3000}
      DATABASE_URL: postgres://bizrush:${POSTGRES_PASSWORD}@db:5432/bizrush
      JWT_SECRET: ${JWT_SECRET:-bizrush-local-dev-secret}
    ports:
      - "${API_PORT:-3000}:${API_PORT:-3000}"
    depends_on:
      db:
        condition: service_healthy
    command: npm run dev
    tty: true

  # Admin dashboard (containerized)
  admin:
    platform: linux/amd64
    profiles: [admin]
    build:
      context: ./admin-base
      target: dev
    volumes:
      - ./admin-base:/workspace
      - admin-node-modules:/workspace/node_modules
      - npm-cache:/root/.npm
    working_dir: /workspace
    environment:
      BIZRUSH_API_BASE_URL: http://api:3000
    ports:
      - "${ADMIN_PORT:-3001}:${ADMIN_PORT:-3001}"
    command: npm run dev -- --port ${ADMIN_PORT:-3001}
    tty: true

volumes:
  api-node-modules:
  admin-node-modules:
  npm-cache:
