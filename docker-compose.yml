# BizRush backend and admin services
# Frontend Flutter apps are run locally.

include:
  - ./mocks/docker-compose.yml

services:
  # ---------- Backend (always start) ---------- #

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: bizrush
      POSTGRES_USER: bizrush
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bizrush -d bizrush"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      target: dev
    volumes:
      - ./api:/workspace
      - api-node-modules:/workspace/node_modules
    environment:
      PORT: ${API_PORT:-3000}
      DATABASE_URL: postgres://bizrush:${POSTGRES_PASSWORD}@db:5432/bizrush
      JWT_SECRET: ${JWT_SECRET:-bizrush-local-dev-secret}
    ports:
      - "${API_PORT:-3000}:${API_PORT:-3000}"
    depends_on:
      db:
        condition: service_healthy
    command: npm run dev
    tty: true

  # Admin dashboard (containerized)
  admin:
    platform: linux/amd64
    profiles: [admin]
    build:
      context: ./admin-base
      target: dev
    volumes:
      - ./admin-base:/workspace
      - admin-node-modules:/workspace/node_modules
      - npm-cache:/root/.npm
    working_dir: /workspace
    ports:
      - "${ADMIN_PORT:-3001}:${ADMIN_PORT:-3001}"
    command: npm run dev -- --port ${ADMIN_PORT:-3001}
    tty: true

volumes:
  api-node-modules:
  # Persists Node dependencies for admin dashboard between runs
  admin-node-modules:
  # Persists npm download cache between runs
  npm-cache:
  pgdata:
