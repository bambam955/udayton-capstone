name: driver test

on:
  pull_request:
    paths:
      - apps/driver/**
      - apps/shared/**
      - .github/workflows/driver.test.yml
  push:
    paths:
      - apps/driver/**
      - apps/shared/**
      - .github/workflows/driver.test.yml
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/driver
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter test
