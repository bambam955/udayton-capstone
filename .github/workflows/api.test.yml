name: test:api

on:
  pull_request:
    paths:
      - api/**
      - .github/workflows/api.test.yml
  push:
    branches:
      - main
    paths:
      - api/**
      - .github/workflows/api.test.yml
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npm test
