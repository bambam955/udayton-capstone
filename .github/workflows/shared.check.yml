name: shared check

on:
  pull_request:
    paths:
      - apps/shared/**
      - .github/workflows/shared.check.yml
  push:
    paths:
      - apps/shared/**
      - .github/workflows/shared.check.yml
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/shared
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze

  format:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/shared
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed .
