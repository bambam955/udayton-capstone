# Render Blueprint for the clean production-style environment.
# It mirrors the beta service topology but intentionally excludes any demo seed
# data so a later production database can start from schema-only migrations.

services:
  - type: web
    runtime: docker
    name: bizrush-prod-api
    plan: free
    region: ohio
    autoDeploy: true
    dockerfilePath: ./api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    buildFilter:
      paths:
        - .dockerignore
        - api/**
        - db/**
        - scripts/**
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bizrush-prod-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      # Mirror the public web origins so production browser preflight requests
      # reach the API instead of failing before the auth routes run.
      - key: CORS_ALLOWED_ORIGINS
        value: https://bizrush-prod.onrender.com,https://bizrush-prod-driver.onrender.com,https://bizrush-prod-admin.onrender.com

  - type: web
    runtime: docker
    name: bizrush-prod-admin
    plan: free
    region: ohio
    autoDeploy: true
    dockerfilePath: ./admin-base/Dockerfile
    dockerContext: ./admin-base
    healthCheckPath: /login
    buildFilter:
      paths:
        - admin-base/**
    envVars:
      - key: NODE_ENV
        value: production
      - key: BIZRUSH_API_BASE_URL
        value: https://bizrush-prod-api.onrender.com

  - type: web
    runtime: docker
    name: bizrush-prod
    plan: free
    region: ohio
    autoDeploy: true
    dockerfilePath: ./apps/main/Dockerfile.web
    dockerContext: .
    healthCheckPath: /
    buildFilter:
      paths:
        - .dockerignore
        - mise.toml
        - apps/**
    envVars:
      - key: BIZRUSH_API_BASE_URL
        value: https://bizrush-prod-api.onrender.com

  - type: web
    runtime: docker
    name: bizrush-prod-driver
    plan: free
    region: ohio
    autoDeploy: true
    dockerfilePath: ./apps/driver/Dockerfile.web
    dockerContext: .
    healthCheckPath: /
    buildFilter:
      paths:
        - .dockerignore
        - mise.toml
        - apps/**
    envVars:
      - key: BIZRUSH_API_BASE_URL
        value: https://bizrush-prod-api.onrender.com

databases:
  - name: bizrush-prod-db
    plan: free
    region: ohio
    postgresMajorVersion: "16"
    databaseName: bizrush
    user: bizrush
