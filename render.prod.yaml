# Render Blueprint for the clean production-style environment.
# It mirrors the beta service topology but intentionally excludes any demo seed
# data so a later production database can start from schema-only migrations.

services:
  - type: web
    runtime: node
    name: bizrush-prod-api
    plan: free
    region: ohio
    autoDeploy: true
    buildCommand: cd api && npm ci --no-audit --no-fund && npm run build
    # Keep prod schema-only migrations in the API startup path for the same
    # reason as beta: free web services do not support pre-deploy commands.
    startCommand: ./scripts/render/install_flyway.sh && node ./scripts/render/run_api_migrations.mjs && cd api && npm run start
    healthCheckPath: /health
    buildFilter:
      paths:
        - api/**
        - db/**
        - scripts/**
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bizrush-prod-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  - type: web
    runtime: node
    name: bizrush-prod-admin
    plan: free
    region: ohio
    autoDeploy: true
    buildCommand: cd admin-base && npm ci --no-audit --no-fund && npm run build
    startCommand: cd admin-base && npm run start
    healthCheckPath: /login
    buildFilter:
      paths:
        - admin-base/**
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: NODE_ENV
        value: production
      - key: BIZRUSH_API_HOSTPORT
        fromService:
          type: web
          name: bizrush-prod-api
          property: hostport

databases:
  - name: bizrush-prod-db
    plan: free
    region: ohio
    postgresMajorVersion: "16"
    databaseName: bizrush
    user: bizrush
