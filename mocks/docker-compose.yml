services:
  walmart-mock:
    image: mockoon/cli:latest
    command: >-
      --data /data/walmart/items.mockoon.json
      --data /data/walmart/orders.mockoon.json
      --data /data/walmart/price.mockoon.json
      --hostname 0.0.0.0
      --port 3000
      --disable-log-to-file
    volumes:
      - ./src/walmart:/data/walmart:ro
    ports:
      - '4010:3000'

  target-mock:
    image: mockoon/cli:latest
    command: >-
      --data /data/target/target.mockoon.json
      --hostname 0.0.0.0
      --port 3000
      --disable-log-to-file
    volumes:
      - ./src/target:/data/target:ro
    ports:
      - '4020:3000'
