services:
  walmart-mock:
    image: mockoon/cli:latest
    command: >-
      --data /data/dist/walmart.mockoon.json
      --hostname 0.0.0.0
      --port 3000
      --disable-log-to-file
    volumes:
      - ./dist:/data/dist:ro
    ports:
      - '4010:3000'

  target-mock:
    image: mockoon/cli:latest
    command: >-
      --data /data/dist/target.mockoon.json
      --hostname 0.0.0.0
      --port 3000
      --disable-log-to-file
    volumes:
      - ./dist:/data/dist:ro
    ports:
      - '4020:3000'

  mocks-dev-tools:
    platform: linux/amd64
    profiles: [tools]
    build:
      context: .
      target: dev
    volumes:
      - .:/workspace
      - mocks-node-modules:/workspace/node_modules
      - mocks-npm-cache:/root/.npm
    working_dir: /workspace
    tty: true

volumes:
  mocks-node-modules:
  mocks-npm-cache:
